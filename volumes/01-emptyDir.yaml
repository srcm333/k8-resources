apiVersion: v1
kind: Pod
metadata:
  name: ngnix
spec:
  containers:
    - image: nginx
      name: ngnix
      volumeMounts:
      - mountPath: /var/log/nginx
        name: ngnix-logs
    - image: almalinux:9
      name: almalinux
      command: ["sleep", "1000"]
      volumeMounts:
      - mountPath: /mnt//nginx-logs
        name: ngnix-logs
        readonly: true
  volumes:
    - name: nginx-logs
      # This create initially empty directory in the node where pod scheduled
      emptyDir:
          sizeLimit: 500Mi
